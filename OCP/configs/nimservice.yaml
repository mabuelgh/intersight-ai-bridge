kind: NIMService
apiVersion: apps.nvidia.com/v1alpha1
metadata:
  name: meta-llama3-1b-instruct
  namespace: openshift-operators
spec:
  image:
    repository: nvcr.io/nim/meta/llama-3.2-1b-instruct
    tag: 1.12.0
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-secret
  authSecret: ngc-api-secret
  storage:
    nimCache:
      name: meta-llama3-1b-instruct
      profile: ''
  scale:
    enabled: false
    hpa:
      minReplicas: 1
      maxReplicas: 10
  resources:
    limits:
      nvidia.com/gpu: 1
  expose:
    service:
      type: ClusterIP
      port: 8000
